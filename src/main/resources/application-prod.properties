spring.application.name=internship-tracker

# DB (from env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.hibernate.ddl-auto=update

# Base URL used in links
app.base-url=${APP_BASE_URL:https://internship-tracker.tirsansapkota.com}

# --- Email (SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}

# Optional: keep these timeouts
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Turn off unless debugging
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

app.mail.from=${MAIL_FROM:Internship Tracker <no-reply@internship-tracker.tirsansapkota.com>}
spring.mail.test-connection=false