<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Preferences', '/css/preferences.css')}"></head>

<body th:class="${themeClass}">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page">

    <div th:if="${breadcrumbs != null}"
         th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}">
    </div>

    <div class="page-header">
        <div>
            <h2 class="title">Preferences</h2>
            <p class="subtitle">Customize how the app looks for you.</p>
        </div>
        <a class="btn ghost" th:href="@{/apps}">← Back</a>
    </div>

    <section th:if="${param.saved}" class="card" style="margin-bottom:14px;">
        <div style="font-weight:700;">Saved!</div>
        <div style="opacity:0.65; margin-top:4px; font-size:0.875rem;">Your preferences have been updated.</div>
    </section>

    <section class="card">
        <form th:action="@{/preferences}" method="post" th:object="${form}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="field">
                <label>Theme</label>
                <p class="field-hint">Choose a color scheme for the app.</p>

                <div class="theme-grid">

                    <label class="theme-swatch">
                        <input type="radio" th:field="*{theme}" th:value="LIGHT" />
                        <div class="swatch-preview" style="background:#ffffff;">
                            <div class="swatch-accent" style="background:#2563eb;"></div>
                        </div>
                        <span class="swatch-name">light</span>
                    </label>

                    <label class="theme-swatch">
                        <input type="radio" th:field="*{theme}" th:value="DARK" />
                        <div class="swatch-preview" style="background:#0b1220;">
                            <div class="swatch-accent" style="background:#60a5fa;"></div>
                        </div>
                        <span class="swatch-name">dark</span>
                    </label>

                    <label class="theme-swatch">
                        <input type="radio" th:field="*{theme}" th:value="SERIKA" />
                        <div class="swatch-preview" style="background:#323437;">
                            <div class="swatch-accent" style="background:#e2b714;"></div>
                        </div>
                        <span class="swatch-name">serika</span>
                    </label>

                    <label class="theme-swatch">
                        <input type="radio" th:field="*{theme}" th:value="NORD" />
                        <div class="swatch-preview" style="background:#2e3440;">
                            <div class="swatch-accent" style="background:#88c0d0;"></div>
                        </div>
                        <span class="swatch-name">nord</span>
                    </label>

                    <label class="theme-swatch">
                        <input type="radio" th:field="*{theme}" th:value="DRACULA" />
                        <div class="swatch-preview" style="background:#282a36;">
                            <div class="swatch-accent" style="background:#bd93f9;"></div>
                        </div>
                        <span class="swatch-name">dracula</span>
                    </label>

                    <label class="theme-swatch">
                        <input type="radio" th:field="*{theme}" th:value="ROSE_PINE" />
                        <div class="swatch-preview" style="background:#191724;">
                            <div class="swatch-accent" style="background:#ebbcba;"></div>
                        </div>
                        <span class="swatch-name">rose pine</span>
                    </label>

                    <label class="theme-swatch">
                        <input type="radio" th:field="*{theme}" th:value="CATPPUCCIN" />
                        <div class="swatch-preview" style="background:#1e1e2e;">
                            <div class="swatch-accent" style="background:#cba6f7;"></div>
                        </div>
                        <span class="swatch-name">catppuccin</span>
                    </label>

                </div>
            </div>

            <div class="actions">
                <button class="btn primary" type="submit">Save</button>
                <a class="btn ghost" th:href="@{/apps}">Cancel</a>
            </div>
        </form>
    </section>

</main>
</body>
</html>
