<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Change Password — Dev', '/css/dev.css')}"></head>

<body th:class="${themeClass}">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page" style="max-width:520px;">

    <div class="page-header">
        <div>
            <h2 class="title">Change Password</h2>
            <p class="subtitle">
                For user: <strong th:text="${targetUser.username}">username</strong>
                <span th:if="${targetUser.email != null and !#strings.isEmpty(targetUser.email)}">
                    (<span th:text="${targetUser.email}">email</span>)
                </span>
            </p>
        </div>
        <a class="btn ghost" th:href="@{/dev/users}">← Users</a>
    </div>

    <div th:if="${cpError}" class="banner error" style="margin-bottom:16px;">
        <span th:text="${cpError}"></span>
    </div>

    <section class="card">
        <p style="margin:0 0 16px; opacity:0.8; font-size:0.9rem;">
            First, use <strong>Send OTP</strong> on the Users page to email a one-time code to this user.
            Ask them for the code, then enter it below along with the new password.
        </p>

        <form th:action="@{/dev/users/{id}/change-password(id=${targetUser.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="field">
                <label for="otp">OTP (from user's email)</label>
                <input id="otp"
                       class="input"
                       type="text"
                       name="otp"
                       maxlength="6"
                       placeholder="6-digit code"
                       autocomplete="off"
                       required />
            </div>

            <div class="field">
                <label for="newPassword">New Password</label>
                <input id="newPassword"
                       class="input"
                       type="password"
                       name="newPassword"
                       minlength="8"
                       placeholder="Minimum 8 characters"
                       required />
            </div>

            <div class="field">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword"
                       class="input"
                       type="password"
                       name="confirmPassword"
                       minlength="8"
                       placeholder="Repeat new password"
                       required />
            </div>

            <div class="actions">
                <button class="btn primary" type="submit">Change Password</button>
                <a class="btn ghost" th:href="@{/dev/users}">Cancel</a>
            </div>
        </form>
    </section>

</main>
</body>
</html>
