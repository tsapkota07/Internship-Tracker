<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dev Settings', '/css/dev.css')}"></head>

<body th:class="${themeClass}">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page">

    <div class="page-header">
        <div>
            <h2 class="title">Dev Settings</h2>
            <p class="subtitle">Manage user accounts. You are logged in as <strong th:text="${username}">dev</strong>.</p>
        </div>
        <a class="btn ghost" th:href="@{/apps}">← Back</a>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="banner success" style="margin-bottom:16px;">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="banner error" style="margin-bottom:16px;">
        <span th:text="${error}"></span>
    </div>
    <div th:if="${otpSentUsername}" class="banner info" style="margin-bottom:16px;">
        OTP sent to <strong th:text="${otpSentUsername}">user</strong>'s email.
        Ask them for the code, then use <strong>Change Password</strong> below.
    </div>

    <section class="card">
        <table class="dev-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Verified</th>
                    <th>Tags</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${allUsers}" th:classappend="${u.id == selfId} ? 'self-row'">
                    <td class="col-id" th:text="${u.id}">1</td>
                    <td class="col-username">
                        <span th:text="${u.username}">username</span>
                        <span th:if="${u.id == selfId}" class="pill you">you</span>
                    </td>
                    <td class="col-email">
                        <span th:if="${u.email != null and !#strings.isEmpty(u.email)}"
                              th:text="${u.email}">email@example.com</span>
                        <span th:unless="${u.email != null and !#strings.isEmpty(u.email)}"
                              class="muted">—</span>
                    </td>
                    <td class="col-verified">
                        <span th:if="${u.emailVerified}" class="pill good">yes</span>
                        <span th:unless="${u.emailVerified}" class="pill neutral">no</span>
                    </td>
                    <td class="col-tags">
                        <span th:text="${u.role}" class="pill role">USER</span>
                        <span th:if="${u.demoUser}" class="pill neutral" style="margin-left:4px;">demo</span>
                    </td>
                    <td class="col-actions">
                        <!-- Can't act on yourself -->
                        <span th:if="${u.id == selfId}" class="muted" style="font-size:0.8rem;">—</span>

                        <th:block th:unless="${u.id == selfId}">
                            <!-- Send OTP (only if user has an email) -->
                            <form th:if="${u.email != null and !#strings.isEmpty(u.email)}"
                                  th:action="@{/dev/users/{id}/send-otp(id=${u.id})}"
                                  method="post"
                                  style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn-sm secondary">Send OTP</button>
                            </form>
                            <span th:unless="${u.email != null and !#strings.isEmpty(u.email)}"
                                  class="pill neutral"
                                  title="No email — cannot send OTP"
                                  style="font-size:0.75rem;">No email</span>

                            <!-- Change Password link (goes to dedicated form) -->
                            <a th:href="@{/dev/users/{id}/change-password(id=${u.id})}"
                               class="btn-sm ghost">Change PW</a>

                            <!-- Delete -->
                            <form th:action="@{/dev/users/{id}/delete(id=${u.id})}"
                                  method="post"
                                  style="display:inline;"
                                  onsubmit="return confirm('Delete account &quot;' + /*[[${u.username}]]*/ 'user' + '&quot;? This is permanent.')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn-sm danger">Delete</button>
                            </form>
                        </th:block>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

</main>
</body>
</html>
