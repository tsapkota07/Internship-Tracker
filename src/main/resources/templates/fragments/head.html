<!-- templates/fragments/head.html -->
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title, extraCss)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <title th:text="${title} ?: 'Internship Tracker'">Internship Tracker</title>

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/theme.css}" />
    <link rel="stylesheet" th:href="@{/css/logout-modal.css}" />
    <link rel="stylesheet" th:href="@{/css/auth.css}" />

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Optional page CSS -->
    <link th:if="${extraCss != null and !#strings.isEmpty(extraCss)}"
          rel="stylesheet"
          th:href="${extraCss}" />
</head>
</html>
