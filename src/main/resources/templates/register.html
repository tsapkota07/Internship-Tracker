<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-auth :: headAuth('Register', null)}"></head>

<body class="auth">
<div class="box">
  <h1>Create Account</h1>
  <p class="muted">Start tracking your internships in a few seconds.</p>

  <p class="error" th:if="${error}" th:text="${error}"></p>

  <form th:action="@{/register}" method="post" th:object="${form}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <div>
      <label>Username</label>
      <input type="text" th:field="*{username}" autocomplete="username">
      <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
    </div>

    <div>
      <label>Email (optional)</label>
      <input type="email" th:field="*{email}" placeholder="you@example.com" autocomplete="email">
    </div>

    <div>
      <label>Password</label>
      <input type="password" th:field="*{password}" autocomplete="new-password">
      <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    </div>

    <button type="submit">Register</button>
  </form>

  <p style="margin-top:14px;"><a th:href="@{/login}">Back to login</a></p>
</div>
</body>
</html>
