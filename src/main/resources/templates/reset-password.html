<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-auth :: headAuth('Reset Password', null)}"></head>

<body class="auth">
<div class="box">
    <h1>Choose a new password</h1>

    <p class="error" th:if="${error == 'invalid'}">
        ❌ This reset link is invalid or expired. Please request a new one.
    </p>

    <form th:action="@{/reset-password}" method="post" th:object="${form}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:field="*{token}" th:value="${token}"/>

        <div>
            <label>New password</label>
            <input type="password" th:field="*{newPassword}" autocomplete="new-password">
            <div class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <button type="submit">Update password</button>
    </form>

    <p style="margin-top:14px;"><a th:href="@{/login}">Back to login</a></p>
</div>
</body>
</html>
