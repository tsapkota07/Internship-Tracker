<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-auth :: headAuth('Reset Password', null)}"></head>

<body class="auth">
<canvas id="particles"></canvas>

<div class="auth-shell">

    <div class="auth-brand">
        <a class="auth-logo" th:href="@{/}">internship tracker</a>
        <p class="auth-tagline">Track every<br>application.</p>
        <ul class="auth-features">
            <li>Filter by status and search by company</li>
            <li>Works without an account</li>
            <li>Simple, private, free</li>
        </ul>
    </div>

    <div class="auth-card">
        <div class="box">
            <h1>Choose a new password</h1>

            <p class="error" th:if="${error == 'invalid'}">
                This reset link is invalid or expired. Please request a new one.
            </p>

            <form th:action="@{/reset-password}" method="post" th:object="${form}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" th:field="*{token}" th:value="${token}"/>

                <div>
                    <label>New password</label>
                    <input type="password" th:field="*{newPassword}" autocomplete="new-password">
                    <div class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                </div>

                <button type="submit">Update password</button>
            </form>

            <p style="margin-top:14px;"><a th:href="@{/login}">Back to login</a></p>
        </div>
    </div>

</div>

<footer class="auth-footer">simple &middot; private &middot; free</footer>
</body>
</html>
