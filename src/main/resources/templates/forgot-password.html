<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-auth :: headAuth('Forgot Password', null)}"></head>

<body class="auth">
<div class="box">
    <h1>Reset password</h1>
    <p class="muted">Enter your email and we’ll send a reset link.</p>

    <p class="muted" style="margin-top:8px;">
        Note: Password resets are only available for accounts with a verified email.
    </p>

    <form th:action="@{/forgot-password}" method="post" th:object="${form}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div>
            <label>Email</label>
            <input type="email" th:field="*{email}" autocomplete="email">
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <button type="submit">Send reset link</button>
    </form>

    <p style="margin-top:14px;"><a th:href="@{/login}">Back to login</a></p>
</div>
</body>
</html>
