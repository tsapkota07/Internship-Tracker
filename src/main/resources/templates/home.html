<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Internship Tracker</title>
    <link rel="stylesheet" th:href="@{/css/home.css}" />
</head>
<body>

<canvas id="particles"></canvas>

<div class="page">

    <nav class="nav">
        <a class="brand" th:href="@{/}">internship tracker</a>
        <div class="nav-links">
            <a th:href="@{/login}">login</a>
            <a class="btn-outline" th:href="@{/register}">register</a>
        </div>
    </nav>

    <section class="hero">
        <p class="eyebrow">your applications, organized.</p>
        <h1>track every<br>application.</h1>
        <p class="sub">from first click to offer letter — simple, fast, free.</p>
        <div class="ctas">
            <a class="btn-primary" th:href="@{/apps}">try without account →</a>
            <a class="btn-ghost" th:href="@{/register}">create account</a>
        </div>
    </section>

    <footer class="footer">
        <span>simple &middot; private &middot; free</span>
    </footer>

</div>

<script>
(function () {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    const COUNT = 90;
    const REPEL_RADIUS = 110;
    const REPEL_FORCE  = 2.8;

    let W, H;
    const mouse = { x: -9999, y: -9999 };

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', () => {
        mouse.x = -9999;
        mouse.y = -9999;
    });

    class Particle {
        constructor(randomY) {
            this.reset(randomY);
        }

        reset(randomY) {
            this.x  = Math.random() * W;
            this.y  = randomY ? Math.random() * H : H + 10;
            this.vx = (Math.random() - 0.5) * 0.35;
            this.vy = -(Math.random() * 0.45 + 0.15);
            this.baseVx = this.vx;
            this.baseVy = this.vy;
            this.r     = Math.random() * 1.4 + 0.4;
            this.alpha = Math.random() * 0.35 + 0.07;
        }

        update() {
            const dx   = this.x - mouse.x;
            const dy   = this.y - mouse.y;
            const dist = Math.hypot(dx, dy);

            if (dist < REPEL_RADIUS && dist > 0) {
                const force = ((REPEL_RADIUS - dist) / REPEL_RADIUS) * REPEL_FORCE;
                this.vx += (dx / dist) * force;
                this.vy += (dy / dist) * force;
            }

            // ease back to natural velocity
            this.vx += (this.baseVx - this.vx) * 0.04;
            this.vy += (this.baseVy - this.vy) * 0.04;

            this.x += this.vx;
            this.y += this.vy;

            // wrap
            if (this.y < -10) this.reset(false);
            if (this.x < -10) this.x = W + 10;
            if (this.x > W + 10) this.x = -10;
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(26,26,26,0.45)';
            ctx.fill();
            ctx.restore();
        }
    }

    const particles = Array.from({ length: COUNT }, () => new Particle(true));

    function loop() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }
    loop();
})();
</script>

</body>
</html>
