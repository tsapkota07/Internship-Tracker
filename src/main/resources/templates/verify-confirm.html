<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-auth :: headAuth('Confirm email', null)}"></head>

<body class="auth">
<canvas id="particles"></canvas>

<div class="auth-shell">

    <div class="auth-brand">
        <a class="auth-logo" th:href="@{/}">internship tracker</a>
        <p class="auth-tagline">Track every<br>application.</p>
        <ul class="auth-features">
            <li>Filter by status and search by company</li>
            <li>Works without an account</li>
            <li>Simple, private, free</li>
        </ul>
    </div>

    <div class="auth-card">
        <div class="box">
            <h1>Confirm your email</h1>

            <p class="muted">
                Click the button below to verify your email address.
            </p>

            <form th:action="@{/account/verify-email/confirm}" method="post" style="margin-top:20px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="token" th:value="${token}" />
                <button class="btn primary" type="submit" style="width:100%;">Verify my email</button>
            </form>
        </div>
    </div>

</div>

<footer class="auth-footer">simple &middot; private &middot; free</footer>
</body>
</html>
