spring.application.name=internship-tracker

# H2 in-memory database (no PostgreSQL needed to run tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema from entities; skip Flyway
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Suppress noisy SQL in test output (flip to true to debug)
spring.jpa.show-sql=false

# Base URL
app.base-url=http://localhost:8080

# Mail is no-op — TestMailConfig provides the bean
spring.mail.test-connection=false
app.mail.from=noreply@test.local
